name: family_tree_app
description: تطبيق شجرة عائلة القويز - 8 أجيال - 870 فرد
publish_to: 'none'
version: 2.0.3+13

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI Components
  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.2
  
  # Backend & Database
  supabase_flutter: ^2.5.6
  
  # Tree Visualization
  graphview: ^1.2.0
  
  # Images & Media
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  
  # Utils
  intl: ^0.19.0
  collection: ^1.18.0
  shared_preferences: ^2.2.2
  
  # Navigation
  go_router: ^14.2.7
  
  # HTTP
  http: ^1.2.0
  
  # URL Launcher
  url_launcher: ^6.2.5

  # Fonts
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
  adaptive_icon_background: "#0A1628"
  adaptive_icon_foreground: "assets/images/app_logo.png"
  remove_alpha_ios: true